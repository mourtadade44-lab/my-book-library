  searchPlaceholder: "Search by title or author…"

theme:
  background: "#0d0d0d"
  surface: "#161616"
  card: "#1c1c1c"
  border: "#2a2a2a"
  accent: "#c9a84c"
  accentHover: "#e8c97a"
  text: "#e8e0d0"
