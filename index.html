<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Loading...</title>
  <!-- Fonts (overridden by YAML theme if provided) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- YAML parser -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <style>
    /* ----- BASE STYLES (controlled by YAML theme variables) ----- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg, #0d0d0d);
      color: var(--text, #e8e0d0);
      font-family: var(--body-font, 'DM Sans', sans-serif);
      font-weight: 300;
      min-height: 100vh;
      transition: background 0.2s;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border, #2a2a2a);
      padding: 0 1.5rem;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 70px;
    }
    .logo {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: 1.5rem;
      color: var(--accent, #c9a84c);
      white-space: nowrap;
    }
    .logo span {
      font-style: italic;
      color: var(--text, #e8e0d0);
      opacity: 0.6;
      margin-left: 0.3em;
    }
    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted, #7a7060);
    }
    #search {
      width: 100%;
      background: var(--surface, #161616);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 8px;
      padding: 10px 14px 10px 42px;
      color: var(--text, #e8e0d0);
      font-size: 0.9rem;
      outline: none;
    }
    #search:focus { border-color: var(--accent, #c9a84c); }
    #search::placeholder { color: var(--muted, #7a7060); }

    .count-badge {
      font-size: 0.8rem;
      color: var(--muted, #7a7060);
      white-space: nowrap;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .hero {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      padding-bottom: 2rem;
    }
    .hero h1 {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 700;
    }
    .hero h1 em { color: var(--accent, #c9a84c); font-style: italic; }
    .hero p { margin-top: 0.8rem; color: var(--muted, #7a7060); max-width: 500px; }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
      align-items: center;
    }
    .filter-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted, #7a7060);
      margin-right: 0.5rem;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border, #2a2a2a);
      color: var(--muted, #7a7060);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent, #c9a84c); color: var(--accent, #c9a84c); }
    .filter-btn.active { background: var(--accent, #c9a84c); border-color: var(--accent, #c9a84c); color: #0d0d0d; font-weight: 500; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    /* Card */
    .card {
      background: var(--card, #1c1c1c);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: var(--card-radius, 12px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.4s ease both;
      cursor: pointer;  /* indicates whole card is clickable */
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .card:hover {
      transform: translateY(var(--hover-lift, -4px));
      border-color: var(--accent-alpha, rgba(201,168,76,0.35));
      box-shadow: var(--hover-shadow, 0 12px 40px rgba(0,0,0,0.5));
    }
    .card-thumb {
      aspect-ratio: 3/4;
      background: var(--surface, #161616);
      position: relative;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .card:hover .card-thumb img { transform: scale(1.04); }
    .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a1a, #222);
    }
    .placeholder-icon { font-size: 2.8rem; opacity: 0.25; }
    .placeholder-title {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: 0.75rem;
      color: var(--muted, #7a7060);
      padding: 0 1rem;
      text-align: center;
    }
    .category-tag {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(13,13,13,0.85);
      border: 1px solid var(--border, #2a2a2a);
      color: var(--accent, #c9a84c);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border-radius: 4px;
      backdrop-filter: blur(6px);
    }
    .card-body {
      padding: 1rem 1.1rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.25rem;
    }
    .card-author {
      font-size: 0.78rem;
      color: var(--accent, #c9a84c);
      margin-bottom: 0.6rem;
      font-weight: 500;
    }
    .card-desc {
      font-size: 0.82rem;
      color: var(--muted, #7a7060);
      line-height: 1.55;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: var(--button-radius, 7px);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s;
    }
    .btn-download {
      background: var(--accent, #c9a84c);
      border: 1px solid var(--accent, #c9a84c);
      color: #0d0d0d;
    }
    .btn-download:hover { background: var(--accent-hover, #e8c97a); }
    .btn-preview {
      background: transparent;
      border: 1px solid var(--border, #2a2a2a);
      color: var(--text, #e8e0d0);
    }
    .btn-preview:hover { border-color: var(--accent, #c9a84c); color: var(--accent, #c9a84c); }

    /* ----- MODAL (fixed height + preview fills space) ----- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--modal-overlay, rgba(0,0,0,0.88));
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(8px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card, #1c1c1c);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 16px;
      width: 100%;
      max-width: 1000px;
      height: 95vh;               /* fill most of the screen */
      max-height: 95vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      flex-shrink: 0;
    }
    .modal-meta { flex: 1; }
    .modal-title {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: 1.3rem;
    }
    .modal-author {
      font-size: 0.82rem;
      color: var(--accent, #c9a84c);
      margin-top: 0.2rem;
    }
    .modal-close {
      background: var(--surface, #161616);
      border: 1px solid var(--border, #2a2a2a);
      color: var(--muted, #7a7060);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .modal-close:hover {
      color: var(--text, #e8e0d0);
      border-color: var(--accent, #c9a84c);
    }

    .modal-preview {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .modal-preview iframe {
      width: 100%;
      flex: 1;
      border: none;
      display: block;
    }

    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border, #2a2a2a);
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .modal-footer .btn {
      flex: none;
      padding: 9px 20px;
    }

    /* Empty / loading */
    .empty, .loading {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted, #7a7060);
    }
    .loading { font-style: italic; }

    .site-footer {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted, #7a7060);
      border-top: 1px solid var(--border, #2a2a2a);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header-inner { gap: 1rem; }
      .logo span { display: none; }
      .count-badge { display: none; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .card-actions { flex-direction: column; }
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><span id="site-title"></span><span id="site-subtitle"></span></div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Search by title or author…" autocomplete="off"/>
    </div>
    <div class="count-badge" id="count"></div>
  </div>
</header>

<main>
  <div class="hero" id="hero-section" style="display: none;">
    <h1 id="hero-heading"></h1>
    <p id="hero-desc"></p>
  </div>

  <div class="filters" id="filters">
    <span class="filter-label">Filter:</span>
  </div>

  <div class="grid" id="grid">
    <div class="loading">Loading library...</div>
  </div>
</main>

<footer class="site-footer" id="footer-text" style="display: none;"></footer>

<!-- PDF Preview Modal -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-meta">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-author" id="modal-author"></div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-preview">
      <iframe id="modal-frame" title="Book preview"></iframe>
    </div>
    <div class="modal-footer">
      <a class="btn btn-download" id="modal-download" download>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </a>
      <button class="btn btn-preview" id="modal-close-footer">Close</button>
    </div>
  </div>
</div>

<script>
  (function() {
    let config = null;
    let books = [];
    let activeCategory = 'All';
    let searchTerm = '';

    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('search');
    const filtersEl = document.getElementById('filters');
    const countEl = document.getElementById('count');

    // ----- Load config.yaml & apply theme/texts -----
    async function loadConfig() {
      try {
        const response = await fetch('config.yaml');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const yamlText = await response.text();
        config = jsyaml.load(yamlText);
        applyTheme(config.theme);
        populateTexts(config.site);
        books = config.books || [];
        initCategories();
        render();
      } catch (error) {
        console.error('Failed to load config.yaml:', error);
        grid.innerHTML = `<div class="empty"><div class="empty-icon">📚</div><p>Ooops! No Books Found.</p></div>`;
      }
    }

    function applyTheme(theme) {
      if (!theme) return;
      const root = document.documentElement;
      if (theme.background) root.style.setProperty('--bg', theme.background);
      if (theme.surface) root.style.setProperty('--surface', theme.surface);
      if (theme.card) root.style.setProperty('--card', theme.card);
      if (theme.border) root.style.setProperty('--border', theme.border);
      if (theme.accent) root.style.setProperty('--accent', theme.accent);
      if (theme.accentHover) root.style.setProperty('--accent-hover', theme.accentHover);
      if (theme.text) root.style.setProperty('--text', theme.text);
      if (theme.muted) root.style.setProperty('--muted', theme.muted);
      if (theme.modalOverlay) root.style.setProperty('--modal-overlay', theme.modalOverlay);
      if (theme.headingFont) root.style.setProperty('--heading-font', theme.headingFont);
      if (theme.bodyFont) root.style.setProperty('--body-font', theme.bodyFont);
      root.style.setProperty('--hover-lift', theme.cardHoverLift === false ? '0' : '-4px');
      root.style.setProperty('--hover-shadow', theme.cardHoverShadow === false ? 'none' : '0 12px 40px rgba(0,0,0,0.5)');
      if (theme.cardRadius) root.style.setProperty('--card-radius', theme.cardRadius);
      if (theme.buttonRadius) root.style.setProperty('--button-radius', theme.buttonRadius);
    }

    function populateTexts(site) {
      document.title = site.pageTitle || site.title || 'Library';
      document.getElementById('site-title').textContent = site.title || '';
      document.getElementById('site-subtitle').textContent = site.subtitle || '';
      if (site.searchPlaceholder) searchInput.placeholder = site.searchPlaceholder;
      
      const heroSection = document.getElementById('hero-section');
      if (site.hero && site.hero.show !== false) {
        const heading = site.hero.heading || '';
        const desc = site.hero.description || '';
        if (heading || desc) {
          heroSection.style.display = 'block';
          document.getElementById('hero-heading').innerHTML = heading;
          document.getElementById('hero-desc').textContent = desc;
        } else {
          heroSection.style.display = 'none';
        }
      } else {
        heroSection.style.display = 'none';
      }
      
      const footerEl = document.getElementById('footer-text');
      if (site.footer && site.footer.show !== false) {
        footerEl.style.display = 'block';
        footerEl.innerHTML = site.footer.text || '';
      } else {
        footerEl.style.display = 'none';
      }
    }

    function initCategories() {
      const categories = config.categories || ['All', ...new Set(books.map(b => b.category))];
      filtersEl.innerHTML = '<span class="filter-label">Filter:</span>';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          activeCategory = cat;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          render();
        });
        filtersEl.appendChild(btn);
      });
    }

    // ----- Render cards & attach click‑to‑preview -----
    function render() {
      const query = searchTerm.toLowerCase().trim();
      const filtered = books.filter(book => {
        const matchCat = activeCategory === 'All' || book.category === activeCategory;
        const matchSearch = !query || 
          book.title.toLowerCase().includes(query) || 
          book.author.toLowerCase().includes(query);
        return matchCat && matchSearch;
      });

      countEl.textContent = `${filtered.length} book${filtered.length !== 1 ? 's' : ''}`;
      
      if (!filtered.length) {
        grid.innerHTML = `<div class="empty"><div class="empty-icon">📖</div><p>No books match your search.</p></div>`;
        return;
      }

      let html = '';
      filtered.forEach((book, i) => {
        const thumbHtml = book.thumbnail && book.thumbnail.trim() !== ''
          ? `<img src="${book.thumbnail}" alt="${book.title}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
          : '';
        const placeholderHtml = `
          <div class="placeholder" ${thumbHtml ? 'style="display:none;"' : ''}>
            <div class="placeholder-icon">📖</div>
            <div class="placeholder-title">${book.title}</div>
          </div>
        `;
        
        // Encode book data for the click handler
        const bookData = JSON.stringify(book).replace(/'/g, "&apos;").replace(/"/g, '&quot;');
        
        html += `
          <div class="card" data-book='${bookData}' style="animation-delay: ${i * 0.05}s">
            <div class="card-thumb">
              ${thumbHtml}
              ${placeholderHtml}
              <span class="category-tag">${book.category}</span>
            </div>
            <div class="card-body">
              <div class="card-title">${book.title}</div>
              <div class="card-author">${book.author}</div>
              <div class="card-desc">${book.description}</div>
              <div class="card-actions">
                <a class="btn btn-download" href="${book.file}" download>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Download
                </a>
                <button class="btn btn-preview">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  Preview
                </button>
              </div>
            </div>
          </div>
        `;
      });
      
      grid.innerHTML = html;

      // Attach card click listeners (open modal) – but NOT when clicking download button
      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', (e) => {
          // If the click originated from a download link/button, let it handle itself
          if (e.target.closest('.btn-download')) return;
          
          const bookData = card.dataset.book;
          if (bookData) {
            const book = JSON.parse(bookData.replace(/&apos;/g, "'").replace(/&quot;/g, '"'));
            openModal(book);
          }
        });
      });

      // Preview buttons also work (they trigger the same modal)
      document.querySelectorAll('.btn-preview').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation(); // avoid double firing from card click
          const card = btn.closest('.card');
          const bookData = card.dataset.book;
          if (bookData) {
            const book = JSON.parse(bookData.replace(/&apos;/g, "'").replace(/&quot;/g, '"'));
            openModal(book);
          }
        });
      });
    }

    // ----- Modal logic -----
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalAuthor = document.getElementById('modal-author');
    const modalFrame = document.getElementById('modal-frame');
    const modalDownload = document.getElementById('modal-download');

    function openModal(book) {
      modalTitle.textContent = book.title;
      modalAuthor.textContent = 'by ' + book.author;
      
      // Build the full URL to the PDF (absolute URL works with Google Viewer)
      const pdfUrl = new URL(book.file, window.location.href).href;
      
      // Detect mobile (simple check)
      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      
      if (isMobile) {
        // Use Google Docs Viewer for mobile inline preview
        modalFrame.src = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`;
      } else {
        // Desktop: direct embed
        modalFrame.src = pdfUrl + '#view=FitH';
      }
      
      // Friendly error if PDF still fails
      modalFrame.onerror = () => {
        modalFrame.srcdoc = `
          <html style="background:#0d0d0d;display:flex;align-items:center;justify-content:center;height:100%;font-family:system-ui,sans-serif;">
            <div style="text-align:center;color:#e8e0d0;padding:1rem;">
              <div style="font-size:3rem;margin-bottom:1rem;">📄❌</div>
              <h2 style="font-weight:400;margin-bottom:0.5rem;">Preview Unavailable</h2>
              <p style="color:#7a7060;">The PDF could not be loaded.<br>Try downloading it instead.</p>
            </div>
          </html>
        `;
      };
      
      modalDownload.href = book.file;
      modalDownload.download = book.title.replace(/\s+/g, '_') + '.pdf';
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
      modal.classList.remove('open');
      modalFrame.src = '';
      document.body.style.overflow = '';
    }

    // Close buttons
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-close-footer').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ----- Search (debounced) -----
    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchTerm = searchInput.value;
        render();
      }, 200);
    });

    // ----- Start -----
    loadConfig();
  })();
