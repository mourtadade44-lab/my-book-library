  <style>
    /* ----- BASE STYLES (customisable via config.yaml) ----- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg, #0d0d0d);
      color: var(--text, #e8e0d0);
      font-family: var(--body-font, 'DM Sans', sans-serif);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border, #2a2a2a);
      padding: 0 1.5rem;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 70px;
    }
    .logo {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: 1.5rem;
      color: var(--accent, #c9a84c);
      white-space: nowrap;
    }
    .logo span {
      font-style: italic;
      color: var(--text, #e8e0d0);
      opacity: 0.6;
      margin-left: 0.3em;
    }
    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted, #7a7060);
    }
    #search {
      width: 100%;
      background: var(--surface, #161616);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 8px;
      padding: 10px 14px 10px 42px;
      color: var(--text, #e8e0d0);
      font-size: 0.9rem;
      outline: none;
    }
    #search:focus { border-color: var(--accent, #c9a84c); }
    #search::placeholder { color: var(--muted, #7a7060); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .count-badge {
      font-size: 0.8rem;
      color: var(--muted, #7a7060);
      white-space: nowrap;
    }
    /* Enhanced pulsing animation */
@keyframes attentionPulse {
  0% { 
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(201, 168, 76, 0.4);
  }
  50% { 
    transform: scale(1.08);
    box-shadow: 0 0 8px 2px rgba(201, 168, 76, 0.3);
  }
  100% { 
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(201, 168, 76, 0.4);
  }
}

.view-toggle {
  background: rgba(201, 168, 76, 0.12); /* dark yellowish tint */
  border: 1px solid var(--accent, #c9a84c);
  color: var(--accent, #c9a84c);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, transform 0.2s, background 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: attentionPulse 2s infinite ease-in-out;
}

.view-toggle:hover {
  background: var(--accent, #c9a84c);
  color: #0d0d0d;
  transform: scale(1.1);
  animation: none;
  box-shadow: 0 0 12px rgba(201, 168, 76, 0.5);
}

.view-toggle:active {
  transform: scale(0.96);
}

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      flex: 1;
      width: 100%;
    }
    
    /* Hero & Contact */
    .hero {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      padding-bottom: 2rem;
    }
    .hero h1 {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 700;
    }
    .hero h1 em { color: var(--accent, #c9a84c); font-style: italic; }
    .hero p { margin-top: 0.8rem; color: var(--muted, #7a7060); max-width: 500px; line-height: 1.6; }
    
    .contact-info {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .contact-info a {
      color: var(--accent, #c9a84c);
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      background: var(--surface, #161616);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border, #2a2a2a);
      transition: all 0.2s;
    }
    .contact-info a:hover {
      border-color: var(--accent, #c9a84c);
      background: rgba(201,168,76,0.1);
    }

    /* Sections */
    .section-title {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: 1.8rem;
      color: var(--text, #e8e0d0);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border, #2a2a2a);
    }

    /* Filters */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
      align-items: center;
    }
    .filter-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted, #7a7060);
      margin-right: 0.5rem;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border, #2a2a2a);
      color: var(--muted, #7a7060);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent, #c9a84c); color: var(--accent, #c9a84c); }
    .filter-btn.active { background: var(--accent, #c9a84c); border-color: var(--accent, #c9a84c); color: #0d0d0d; font-weight: 500; }

    /* Grid & Cards – shorter cards */
    /* Grid & Cards – shorter cards */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.5rem;
  margin-bottom: 4rem;
}

/* Tablet: 2 columns */
@media (min-width: 640px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* Desktop: 3 columns */
@media (min-width: 1024px) {
  .grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

    .card {
      background: var(--card, #1c1c1c);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: var(--card-radius, 12px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.4s ease both;
      cursor: pointer;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .card:hover {
      transform: translateY(var(--hover-lift, -4px));
      border-color: var(--accent-alpha, rgba(201,168,76,0.35));
      box-shadow: var(--hover-shadow, 0 12px 40px rgba(0,0,0,0.5));
    }
    
    /* Article card specific */
    .card.article-card .card-thumb { display: none; }
    .card.article-card .category-tag {
      position: relative;
      top: 0;
      left: 0;
      display: inline-block;
      margin-bottom: 0.8rem;
      background: rgba(201,168,76,0.15);
      border: 1px solid var(--accent, #c9a84c);
      color: var(--accent, #c9a84c);
    }

    .card-thumb {
      aspect-ratio: 4 / 5;
      background: var(--surface, #161616);
      position: relative;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .card:hover .card-thumb img { transform: scale(1.04); }
    .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a1a, #222);
    }
    .placeholder-icon { font-size: 2.8rem; opacity: 0.25; }
    .placeholder-title {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: 0.75rem;
      color: var(--muted, #7a7060);
      padding: 0 1rem;
      text-align: center;
    }
    .category-tag {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(13,13,13,0.85);
      border: 1px solid var(--border, #2a2a2a);
      color: var(--accent, #c9a84c);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border-radius: 4px;
      backdrop-filter: blur(6px);
      z-index: 2;
    }
    /* Language badge (top right) */
    .language-tag {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: rgba(13,13,13,0.85);
  border: 1px solid var(--border, #2a2a2a);
  color: var(--accent, #c9a84c);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 3px 8px;
  border-radius: 4px;
  backdrop-filter: blur(6px);
  z-index: 2;
}
    .card-body {
      padding: 1rem 1rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.25rem;
    }
    .card-author {
      font-size: 0.78rem;
      color: var(--accent, #c9a84c);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--muted, #7a7060);
      line-height: 1.5;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }
    .btn {
      flex: 1;
      padding: 7px 8px;
      border-radius: var(--button-radius, 7px);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent, #c9a84c);
      border: 1px solid var(--accent, #c9a84c);
      color: #0d0d0d;
    }
    .btn-primary:hover { background: var(--accent-hover, #e8c97a); }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border, #2a2a2a);
      color: var(--text, #e8e0d0);
    }
    .btn-secondary:hover { border-color: var(--accent, #c9a84c); color: var(--accent, #c9a84c); }

    /* Article Reader */
    #article-reader {
      display: none;
      max-width: 800px;
      margin: 0 auto;
      background: var(--surface, #161616);
      padding: 3rem;
      border-radius: 12px;
      border: 1px solid var(--border, #2a2a2a);
    }
    .back-btn {
      background: transparent;
      border: 1px solid var(--border, #2a2a2a);
      color: var(--muted, #7a7060);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 2rem;
      transition: all 0.2s;
    }
    .back-btn:hover { color: var(--text, #e8e0d0); border-color: var(--text, #e8e0d0); }
    .article-header {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
    }
    .article-header h1 {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .article-meta {
      color: var(--muted, #7a7060);
      font-size: 0.9rem;
    }
    .article-content {
      line-height: 1.8;
      font-size: 1.1rem;
      color: #dfdfdf;
    }
    .article-content p { margin-bottom: 1.5rem; }
    .article-content h1, .article-content h2, .article-content h3 {
      font-family: var(--heading-font, 'Playfair Display', serif);
      color: var(--accent, #c9a84c);
      margin: 2rem 0 1rem;
    }
    .article-content strong { color: #fff; font-weight: 700; }
    .article-content em { color: #ccc; }
    .article-content blockquote {
      border-left: 4px solid var(--accent, #c9a84c);
      padding-left: 1rem;
      margin: 1.5rem 0;
      font-style: italic;
      color: var(--muted, #7a7060);
    }
    .article-content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 1.5rem 0;
    }
    .giscus-wrapper {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border, #2a2a2a);
    }

    /* Modal with comments at bottom */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--modal-overlay, rgba(0,0,0,0.88));
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(8px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card, #1c1c1c);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 16px;
      width: 100%;
      max-width: 1000px;
      height: 90vh;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      flex-shrink: 0;
    }
    .modal-meta { flex: 1; }
    .modal-title {
      font-family: var(--heading-font, 'Playfair Display', serif);
      font-size: 1.3rem;
    }
    .modal-author {
      font-size: 0.82rem;
      color: var(--accent, #c9a84c);
      margin-top: 0.2rem;
    }
    .modal-close {
      background: var(--surface, #161616);
      border: 1px solid var(--border, #2a2a2a);
      color: var(--muted, #7a7060);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .modal-close:hover { color: var(--text, #e8e0d0); border-color: var(--accent, #c9a84c); }

    .modal-preview {
      flex: 1;
      min-height: 0;
      display: flex;
      background: #fff;
    }
    .pdf-viewer {
      width: 100%;
      height: 100%;
    }
    .pdf-viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border, #2a2a2a);
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .modal-comments {
      background: var(--surface, #161616);
      border-top: 1px solid var(--border, #2a2a2a);
      padding: 1.5rem;
      overflow-y: auto;
      max-height: 40vh;
      flex-shrink: 0;
    }

    .empty, .loading {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted, #7a7060);
    }
    .loading { font-style: italic; }

    .site-footer {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted, #7a7060);
      border-top: 1px solid var(--border, #2a2a2a);
    }

    #global-comments {
      max-width: 900px;
      margin: 0 auto 3rem auto;
      padding: 0 1.5rem;
    }

    @media (max-width: 600px) {
      .header-inner { gap: 1rem; }
      .logo span { display: none; }
      .count-badge { display: none; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .card-actions { flex-direction: column; }
      #article-reader { padding: 1.5rem; }
    }
    @media (max-width: 380px) {
      .grid { 
        grid-template-columns: repeat(2, 1fr);
        gap: 0.8rem;
      }
    }

    /* Scrollable categories row */
.filters {
  display: flex;
  flex-wrap: nowrap;
  overflow-x: auto;
  overflow-y: hidden;
  gap: 0.5rem;
  margin-bottom: 2rem;
  padding-bottom: 6px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--accent, #c9a84c) var(--surface, #161616);
}

.filters::-webkit-scrollbar {
  height: 4px;
}
.filters::-webkit-scrollbar-thumb {
  background: var(--accent, #c9a84c);
  border-radius: 4px;
}

.filter-btn {
  flex-shrink: 0;
  white-space: nowrap;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo"><span id="site-title"></span><span id="site-subtitle"></span></div>
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="Search by title or author…" autocomplete="off"/>
      </div>
      <div class="header-actions">
        <button class="view-toggle" id="view-toggle-btn">
          <span id="toggle-icon">📚</span> <span id="toggle-text">Switch to Articles</span>
        </button>
        <div class="count-badge" id="count"></div>
      </div>
    </div>
  </header>

  <main>
    <!-- Browse Section (Grid) -->
    <div id="browse-section">
       <div class="hero" id="hero-section" style="display: none;">
        <h1 id="hero-heading"></h1>
        <p id="hero-desc"></p>
      </div>

      <div id="filters-container" style="display: block;">
        <div class="filters" id="filters">
          <span class="filter-label">Filter:</span>
        </div>
      </div>

      <h2 class="section-title" id="section-title">Library Collection</h2>
      <div class="grid" id="grid">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <!-- Article Reader View -->
    <div id="article-reader">
      <button class="back-btn" onclick="closeArticle()">← Back to Articles</button>
      <div class="article-header">
        <span class="category-tag" id="read-category">Category</span>
        <h1 id="read-title">Article Title</h1>
        <div class="article-meta" id="read-author">By Author</div>
      </div>
      <div class="article-content" id="read-content">Loading content...</div>
      <div class="giscus-wrapper" id="article-comments"></div>
    </div>

    <div id="global-comments"></div>
  </main>

  <footer class="site-footer" id="footer-text" style="display: none;">
      <div id="footer-text-content"></div>
      <div id="contact-info" class="contact-info" style="display: none;"></div>
  </footer>

  <!-- PDF Preview Modal -->
  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-meta">
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-author" id="modal-author"></div>
        </div>
        <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-preview">
        <div class="pdf-viewer">
          <iframe id="modal-frame" title="Book preview"></iframe>
        </div>
      </div>
      <div class="modal-footer">
        <a class="btn btn-primary" id="modal-download" download>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </a>
        <button class="btn btn-secondary" id="modal-close-footer">Close</button>
      </div>
      <div class="modal-comments" id="modal-comments-container"></div>
    </div>
  </div>

  <script>
    (function() {
      // State
      let config = null;
      let books = [];
      let articles = [];
      let currentView = 'books';
      let activeCategory = 'All';
      let searchTerm = '';
      let giscusScriptLoaded = false;

      // DOM elements
      const grid = document.getElementById('grid');
      const searchInput = document.getElementById('search');
      const filtersEl = document.getElementById('filters');
      const filtersContainer = document.getElementById('filters-container');
      const countEl = document.getElementById('count');
      const sectionTitle = document.getElementById('section-title');
      const browseSection = document.getElementById('browse-section');
      const articleReader = document.getElementById('article-reader');
      const viewToggleBtn = document.getElementById('view-toggle-btn');
      const toggleIcon = document.getElementById('toggle-icon');
      const toggleText = document.getElementById('toggle-text');

      // Helper: escape HTML
      function escapeHtml(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      // --- Load all YAML files ---
      async function loadData() {
        try {
          const [configRes, booksRes, articlesRes] = await Promise.all([
            fetch('config.yaml'),
            fetch('books.yaml'),
            fetch('articles.yaml')
          ]);
          
          const configText = await configRes.text();
          const booksText = await booksRes.text();
          const articlesText = await articlesRes.text();

          config = jsyaml.load(configText);
          books = jsyaml.load(booksText)?.books || [];
          articles = jsyaml.load(articlesText)?.articles || [];

          applyTheme(config.theme);
          populateTexts(config.site);
          injectGoogleAnalytics(config.analytics);
          injectGlobalComments(config.comments);
          
          initCategories();
          setTimeout(enableScrollableCategories, 100);
          renderGrid();
        } catch (error) {
          console.error('Failed to load YAML:', error);
          grid.innerHTML = `<div class="empty">Failed to load library. Check console.</div>`;
        }
      }
function enableScrollableCategories() {
  const filters = document.getElementById('filters');
  if (!filters) return;

  // Apply scrollable styles programmatically (optional, if CSS not already applied)
  filters.style.display = 'flex';
  filters.style.flexWrap = 'nowrap';
  filters.style.overflowX = 'auto';
  filters.style.gap = '0.5rem';
  filters.style.paddingBottom = '6px';

  // Make all filter buttons non-shrinking
  const buttons = filters.querySelectorAll('.filter-btn');
  buttons.forEach(btn => {
    btn.style.flexShrink = '0';
    btn.style.whiteSpace = 'nowrap';
  });

  // Auto‑scroll hint (only if content overflows)
  setTimeout(() => {
    if (filters.scrollWidth > filters.clientWidth) {
      filters.scrollBy({ left: 80, behavior: 'smooth' });
      setTimeout(() => {
        filters.scrollBy({ left: -80, behavior: 'smooth' });
      }, 600);
    }
  }, 800);
}
      function applyTheme(theme) {
        if (!theme) return;
        const root = document.documentElement;
        if (theme.background) root.style.setProperty('--bg', theme.background);
        if (theme.surface) root.style.setProperty('--surface', theme.surface);
        if (theme.card) root.style.setProperty('--card', theme.card);
        if (theme.border) root.style.setProperty('--border', theme.border);
        if (theme.accent) root.style.setProperty('--accent', theme.accent);
        if (theme.accentHover) root.style.setProperty('--accent-hover', theme.accentHover);
        if (theme.text) root.style.setProperty('--text', theme.text);
        if (theme.muted) root.style.setProperty('--muted', theme.muted);
        if (theme.modalOverlay) root.style.setProperty('--modal-overlay', theme.modalOverlay);
        if (theme.headingFont) root.style.setProperty('--heading-font', theme.headingFont);
        if (theme.bodyFont) root.style.setProperty('--body-font', theme.bodyFont);
        root.style.setProperty('--hover-lift', theme.cardHoverLift === false ? '0' : '-4px');
        root.style.setProperty('--hover-shadow', theme.cardHoverShadow === false ? 'none' : '0 12px 40px rgba(0,0,0,0.5)');
        if (theme.cardRadius) root.style.setProperty('--card-radius', theme.cardRadius);
        if (theme.buttonRadius) root.style.setProperty('--button-radius', theme.buttonRadius);
      }

      function populateTexts(site) {
        document.title = site.pageTitle || site.title || 'Library';
        document.getElementById('site-title').textContent = site.title || '';
        document.getElementById('site-subtitle').textContent = site.subtitle || '';
        if (site.searchPlaceholder) searchInput.placeholder = site.searchPlaceholder;
        
        const heroSection = document.getElementById('hero-section');
        if (site.hero && site.hero.show !== false) {
          heroSection.style.display = 'block';
          document.getElementById('hero-heading').innerHTML = site.hero.heading || '';
          document.getElementById('hero-desc').textContent = site.hero.description || '';
        }
        
        // Contact in footer
        if (site.contact) {
          const contactEl = document.getElementById('contact-info');
          let html = '';
          if (site.contact.email) {
            html += `<a href="mailto:${site.contact.email}">📧 ${site.contact.email}</a>`;
          }
          if (site.contact.phone) {
            html += `<a href="tel:${site.contact.phone.replace(/\s+/g, '')}">📞 ${site.contact.phone}</a>`;
          }
          if (html) {
            contactEl.innerHTML = html;
            contactEl.style.display = 'flex';
            contactEl.style.justifyContent = 'center';
            contactEl.style.gap = '2rem';
            contactEl.style.padding = '1rem 0';
          }
      }
      
      // Footer text
      const footerEl = document.getElementById('footer-text');
      const footerTextContent = document.getElementById('footer-text-content');
      if (site.footer && site.footer.show !== false) {
        footerEl.style.display = 'block';
        footerTextContent.innerHTML = site.footer.text || '';
      } else if (site.contact && (site.contact.email || site.contact.phone)) {
        footerEl.style.display = 'block';
        footerTextContent.innerHTML = '';
      }
    }

      function injectGoogleAnalytics(analytics) {
        if (analytics && analytics.google_id) {
          const script = document.createElement('script');
          script.async = true;
          script.src = `https://www.googletagmanager.com/gtag/js?id=${analytics.google_id}`;
          document.head.appendChild(script);
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', analytics.google_id);
        }
      }

      function injectGlobalComments(comments) {
        if (comments && comments.enabled && comments.repo) {
          const container = document.getElementById('global-comments');
          const script = document.createElement('script');
          script.src = "https://giscus.app/client.js";
          script.setAttribute("data-repo", comments.repo);
          if (comments.repoId) script.setAttribute("data-repo-id", comments.repoId);
          if (comments.category) script.setAttribute("data-category", comments.category);
          if (comments.categoryId) script.setAttribute("data-category-id", comments.categoryId);
          script.setAttribute("data-mapping", "pathname");
          script.setAttribute("data-strict", "0");
          script.setAttribute("data-reactions-enabled", "1");
          script.setAttribute("data-emit-metadata", "0");
          script.setAttribute("data-input-position", "bottom");
          script.setAttribute("data-theme", "dark");
          script.setAttribute("data-lang", "en");
          script.crossOrigin = "anonymous";
          script.async = true;
          container.appendChild(script);
        }
      }

      function initCategories() {
        const categories = config.categories || ['All', ...new Set(books.map(b => b.category))];
        filtersEl.innerHTML = '<span class="filter-label">Filter:</span>';
        categories.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
          btn.textContent = cat;
          btn.addEventListener('click', () => {
            activeCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid();
          });
          filtersEl.appendChild(btn);
        });
      }

      function toggleView() {
        currentView = currentView === 'books' ? 'articles' : 'books';
        if (currentView === 'books') {
          toggleIcon.textContent = '📚';
          toggleText.textContent = 'Switch to Articles';
          sectionTitle.textContent = 'Library Collection';
          filtersContainer.style.display = 'block';
          activeCategory = 'All';
          document.querySelectorAll('.filter-btn').forEach((b, i) => {
            b.classList.toggle('active', i === 0);
          });
        } else {
          toggleIcon.textContent = '📰';
          toggleText.textContent = 'Switch to Books';
          sectionTitle.textContent = 'Essays & Articles';
          filtersContainer.style.display = 'none';
        }
        closeArticle();
        renderGrid();
      }
      viewToggleBtn.addEventListener('click', toggleView);

      function renderGrid() {
        const data = currentView === 'books' ? books : articles;
        const query = searchTerm.toLowerCase().trim();
        
        let filtered = data.filter(item => {
          const matchSearch = !query || 
            item.title.toLowerCase().includes(query) || 
            item.author.toLowerCase().includes(query);
          if (currentView === 'books') {
            const matchCat = activeCategory === 'All' || item.category === activeCategory;
            return matchSearch && matchCat;
          }
          return matchSearch;
        });

        countEl.textContent = `${filtered.length} item${filtered.length !== 1 ? 's' : ''}`;
        
        if (!filtered.length) {
          grid.innerHTML = `<div class="empty">No items found.</div>`;
          return;
        }

        let html = '';
        filtered.forEach((item, i) => {
          if (currentView === 'books') {
            const thumbHtml = item.thumbnail && item.thumbnail.trim() !== ''
              ? `<img src="${item.thumbnail}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
              : '';
            const placeholderHtml = `
              <div class="placeholder" ${thumbHtml ? 'style="display:none;"' : ''}>
                <div class="placeholder-icon">📖</div>
                <div class="placeholder-title">${escapeHtml(item.title)}</div>
              </div>
            `;
            const bookData = JSON.stringify(item).replace(/'/g, "&apos;").replace(/"/g, '&quot;');
            
            html += `
              <div class="card" data-book='${bookData}' style="animation-delay: ${i * 0.03}s">
                <div class="card-thumb">
                  ${thumbHtml}
                  ${placeholderHtml}
                  <span class="category-tag">${escapeHtml(item.category)}</span>
                  ${item.language ? `<span class="language-tag">${escapeHtml(item.language)}</span>` : ''}
                </div>
                <div class="card-body">
                  <div class="card-title">${escapeHtml(item.title)}</div>
                  <div class="card-author">${escapeHtml(item.author)}</div>
                  <div class="card-desc">${escapeHtml(item.description)}</div>
                  <div class="card-actions">
                    <a class="btn btn-primary" href="${item.file}" download>Download</a>
                    <button class="btn btn-secondary preview-btn">Preview</button>
                  </div>
                </div>
              </div>
            `;
          } else {
            const articleData = JSON.stringify(item).replace(/'/g, "&apos;").replace(/"/g, '&quot;');
            html += `
              <div class="card article-card" data-article='${articleData}' style="animation-delay: ${i * 0.03}s">
                <div class="card-body">
                  <span class="category-tag">${escapeHtml(item.category || 'Article')}</span>
                  <div class="card-title">${escapeHtml(item.title)}</div>
                  <div class="card-author">${escapeHtml(item.author)}</div>
                  <div class="card-desc">${escapeHtml(item.description)}</div>
                  <div class="card-actions">
                    <button class="btn btn-primary read-btn">Read Article</button>
                  </div>
                </div>
              </div>
            `;
          }
        });
        grid.innerHTML = html;
      }

      // Event delegation
      document.addEventListener('click', (e) => {
        if (e.target.closest('.preview-btn')) {
          e.preventDefault();
          const card = e.target.closest('.card');
          if (card && card.dataset.book) {
            openBookModal(JSON.parse(card.dataset.book.replace(/&apos;/g, "'").replace(/&quot;/g, '"')));
          }
          return;
        }
        if (e.target.closest('.read-btn')) {
          const card = e.target.closest('.card');
          if (card && card.dataset.article) {
            openArticle(JSON.parse(card.dataset.article.replace(/&apos;/g, "'").replace(/&quot;/g, '"')));
          }
          return;
        }
        const card = e.target.closest('.card');
        if (card && !e.target.closest('a')) {
          if (card.dataset.book) {
            openBookModal(JSON.parse(card.dataset.book.replace(/&apos;/g, "'").replace(/&quot;/g, '"')));
          } else if (card.dataset.article) {
            openArticle(JSON.parse(card.dataset.article.replace(/&apos;/g, "'").replace(/&quot;/g, '"')));
          }
        }
      });

      function parseShortcodes(text) {
        let html = text
          .replace(/\[h1\](.*?)\[\/h1\]/gis, '<h1>$1</h1>')
          .replace(/\[h2\](.*?)\[\/h2\]/gis, '<h2>$1</h2>')
          .replace(/\[h3\](.*?)\[\/h3\]/gis, '<h3>$1</h3>')
          .replace(/\[b\](.*?)\[\/b\]/gis, '<strong>$1</strong>')
          .replace(/\[i\](.*?)\[\/i\]/gis, '<em>$1</em>')
          .replace(/\[u\](.*?)\[\/u\]/gis, '<u>$1</u>')
          .replace(/\[color=(.*?)\](.*?)\[\/color\]/gis, '<span style="color:$1">$2</span>')
          .replace(/\[center\](.*?)\[\/center\]/gis, '<div style="text-align:center">$1</div>')
          .replace(/\[quote\](.*?)\[\/quote\]/gis, '<blockquote>$1</blockquote>')
          .replace(/\[img=(.*?)\]/gis, '<img src="$1" alt="Image">');
        html = html.split(/\n\s*\n/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
        return html;
      }

      async function openArticle(article) {
        document.getElementById('read-title').textContent = article.title;
        document.getElementById('read-author').textContent = `By ${article.author}`;
        document.getElementById('read-category').textContent = article.category || 'Article';
        document.getElementById('read-content').innerHTML = '<p>Loading...</p>';

        browseSection.style.display = 'none';
        articleReader.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });

        try {
          const response = await fetch(article.file);
          if (!response.ok) throw new Error('File not found');
          const text = await response.text();
          document.getElementById('read-content').innerHTML = parseShortcodes(text);
        } catch (err) {
          document.getElementById('read-content').innerHTML = `<p style="color: var(--accent)">⚠️ Content could not be loaded. Comments are still available below.</p>`;
        } finally {
          loadArticleComments(article.title);
        }
      }

      function closeArticle() {
        browseSection.style.display = 'block';
        articleReader.style.display = 'none';
        document.getElementById('article-comments').innerHTML = '';
      }
      window.closeArticle = closeArticle;

      // --- Giscus Loader ---
      function loadGiscusComments(containerId, term) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        const cleanTerm = term.trim().substring(0, 200);
        
        if (!giscusScriptLoaded) {
          const script = document.createElement('script');
          script.src = 'https://giscus.app/client.js';
          script.setAttribute('data-repo', config.comments.repo);
          if (config.comments.repoId) script.setAttribute('data-repo-id', config.comments.repoId);
          if (config.comments.category) script.setAttribute('data-category', config.comments.category);
          if (config.comments.categoryId) script.setAttribute('data-category-id', config.comments.categoryId);
          script.setAttribute('data-mapping', 'specific');
          script.setAttribute('data-term', cleanTerm);
          script.setAttribute('data-strict', '0');
          script.setAttribute('data-reactions-enabled', '1');
          script.setAttribute('data-emit-metadata', '0');
          script.setAttribute('data-input-position', 'bottom');
          script.setAttribute('data-theme', 'dark');
          script.setAttribute('data-lang', 'en');
          script.setAttribute('crossorigin', 'anonymous');
          script.async = true;
          script.onload = () => { giscusScriptLoaded = true; };
          container.innerHTML = '';
          container.appendChild(script);
        } else {
          if (window.giscus && typeof window.giscus.sendMessage === 'function') {
            window.giscus.sendMessage({ setConfig: { term: cleanTerm } });
            container.innerHTML = '';
          } else {
            container.innerHTML = '';
            const newScript = document.createElement('script');
            newScript.src = 'https://giscus.app/client.js';
            newScript.setAttribute('data-repo', config.comments.repo);
            if (config.comments.repoId) newScript.setAttribute('data-repo-id', config.comments.repoId);
            if (config.comments.category) newScript.setAttribute('data-category', config.comments.category);
            if (config.comments.categoryId) newScript.setAttribute('data-category-id', config.comments.categoryId);
            newScript.setAttribute('data-mapping', 'specific');
            newScript.setAttribute('data-term', cleanTerm);
            newScript.setAttribute('data-strict', '0');
            newScript.setAttribute('data-reactions-enabled', '1');
            newScript.setAttribute('data-emit-metadata', '0');
            newScript.setAttribute('data-input-position', 'bottom');
            newScript.setAttribute('data-theme', 'dark');
            newScript.setAttribute('data-lang', 'en');
            newScript.setAttribute('crossorigin', 'anonymous');
            newScript.async = true;
            container.appendChild(newScript);
          }
        }
      }

      function loadArticleComments(title) {
        loadGiscusComments('article-comments', title);
      }

      // --- Book Modal ---
      const modal = document.getElementById('modal');
      const modalTitle = document.getElementById('modal-title');
      const modalAuthor = document.getElementById('modal-author');
      const modalFrame = document.getElementById('modal-frame');
      const modalDownload = document.getElementById('modal-download');
      const modalComments = document.getElementById('modal-comments-container');

      function openBookModal(book) {
        modalTitle.textContent = book.title;
        modalAuthor.textContent = 'by ' + book.author;
        
        const pdfUrl = new URL(book.file, window.location.href).href;
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        if (isMobile) {
          modalFrame.src = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`;
        } else {
          modalFrame.src = pdfUrl + '#view=FitH';
        }
        
        modalFrame.onerror = () => {
          modalFrame.srcdoc = `<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#0d0d0d;color:#e8e0d0;">Preview unavailable.</div>`;
        };
        
        modalDownload.href = book.file;
        modalDownload.download = book.title.replace(/\s+/g, '_') + '.pdf';
        
        loadModalComments(book.title);
        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function loadModalComments(title) {
        loadGiscusComments('modal-comments-container', title);
      }
      
      function closeModal() {
        modal.classList.remove('open');
        modalFrame.src = '';
        modalComments.innerHTML = '';
        document.body.style.overflow = '';
      }

      document.getElementById('modal-close').addEventListener('click', closeModal);
      document.getElementById('modal-close-footer').addEventListener('click', closeModal);
      modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

      // Search
      let searchTimeout;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          searchTerm = searchInput.value;
          renderGrid();
        }, 200);
      });

      // Start
      loadData();
    })();
  </script>
